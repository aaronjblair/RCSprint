<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>RC Dirt Oval — 1/10 Dirt Oval Sprint Cars</title>
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'&gt;&lt;text y='14' font-size='14'&gt;🏎️&lt;/text&gt;&lt;/svg&gt;" />
    <meta name="theme-color" content="#0a0c10" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RC Dirt Oval" />
    <link rel="apple-touch-icon" href="apple-touch-icon-180.png" />
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0c10; }
      #app { position: fixed; inset: 0; }
      #renderCanvas { width: 100%; height: 100%; display: block; touch-action: none; outline: none; }
      #hud {
        position: fixed; inset: 0; pointer-events: none;
        font-family: "Segoe UI", system-ui, sans-serif; color: #eef2f7;
        text-shadow: 0 1px 2px rgba(0,0,0,0.8);
      }
      #fps {
        position: absolute; top: 8px; right: 12px;
        font-variant-numeric: tabular-nums; font-size: 13px;
        color: #9fe0a0; background: rgba(0,0,0,0.35);
        padding: 2px 8px; border-radius: 6px;
      }
      #mute {
        position: absolute; top: 32px; right: 12px;
        pointer-events: auto; cursor: pointer; user-select: none;
        font-size: 14px; line-height: 1; color: #cfe0f0; background: rgba(0,0,0,0.35);
        padding: 4px 8px; border-radius: 6px; border: 0;
      }
      #mute:hover { color: #fff; background: rgba(0,0,0,0.5); }
      #pause {
        position: absolute; top: 56px; right: 12px;
        pointer-events: auto; cursor: pointer; user-select: none;
        font-size: 14px; line-height: 1; color: #cfe0f0; background: rgba(0,0,0,0.35);
        padding: 4px 8px; border-radius: 6px; border: 0;
      }
      #pause:hover { color: #fff; background: rgba(0,0,0,0.5); }
      /* On touch devices the pause control is a big, obvious circular button at top-center. */
      body.touch-active #pause {
        top: max(10px, env(safe-area-inset-top)); left: 50%; right: auto; transform: translateX(-50%);
        width: 66px; height: 66px; border-radius: 50%; padding: 0; font-size: 30px;
        display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5);
        border: 1px solid rgba(255,255,255,0.3);
      }
      /* Small physical-key glyphs next to the desktop controls (hidden on touch). */
      .keycap {
        display: inline-block; margin-left: 5px; padding: 0 5px; min-width: 12px;
        font-size: 10px; font-weight: 700; line-height: 16px; text-align: center;
        color: #1a1d24; background: linear-gradient(#fdfdfd, #d4d8df);
        border-radius: 4px; box-shadow: 0 1px 0 #888, inset 0 1px 0 #fff; vertical-align: middle;
      }
      body.touch-active .keycap { display: none; }
      #pauseOverlay {
        position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
        pointer-events: auto; cursor: pointer; background: rgba(6,8,12,0.55);
        font-weight: 800; font-size: 26px; color: #ffd34d; letter-spacing: 1px; text-align: center;
      }
      /* Upper-left camera view toggle (cycles In-Car / Track / Aerial). Sits in the corner; the
         title is shifted right to share the row. */
      #view {
        position: absolute; top: 10px; left: 12px;
        pointer-events: auto; cursor: pointer; user-select: none;
        font-size: 13px; line-height: 1; font-weight: 700; color: #cfe0f0; background: rgba(0,0,0,0.42);
        padding: 5px 9px; border-radius: 6px; border: 0; white-space: nowrap;
      }
      #view:hover { color: #fff; background: rgba(0,0,0,0.6); }
      #title {
        position: absolute; top: 12px; left: 116px; font-weight: 700; letter-spacing: 0.5px;
        font-size: 15px; color: #ffd34d;
      }
      #title small { display:block; font-weight: 400; font-size: 11px; color: #c8d0da; letter-spacing: 0; }
      /* Keep the brand from crowding the centered race HUD on narrow phones. */
      @media (max-width: 560px) { #title small { display: none; } #title { font-size: 13px; top: 14px; } }
      #racehud {
        position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 22px; align-items: center;
        background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 10px;
        font-variant-numeric: tabular-nums;
      }
      #racehud .lbl { font-size: 10px; color: #9aa6b3; text-transform: uppercase; letter-spacing: 1px; }
      #racehud .val { font-size: 20px; font-weight: 700; color: #fff; }
      #racehud .val small { font-size: 12px; color: #ffd34d; }
      #speedo {
        position: absolute; bottom: 16px; right: 20px; text-align: right;
      }
      #speedo .n { font-size: 44px; font-weight: 800; color: #fff; font-variant-numeric: tabular-nums; line-height: 1; }
      #speedo .u { font-size: 13px; color: #9aa6b3; letter-spacing: 2px; }
      #loading {
        position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 14px; background: #0a0c10; color: #ffd34d; font-family: system-ui, sans-serif; font-size: 18px; z-index: 10;
        transition: opacity .35s ease;
      }
      /* Opening logo: the SUPER JAY #32 racing badge. */
      #loadLogo { width: min(380px, 76vw); height: auto; filter: drop-shadow(0 6px 18px rgba(0,0,0,0.6)); }
      #loadTitle { font-weight: 900; letter-spacing: 3px; font-size: 30px; }
      /* Credit line under the badge, smaller + muted. */
      #loadCredit { font-size: 13px; letter-spacing: 1px; color: #c8d0da; opacity: 0.9; margin-top: -6px; }
      #loadLabel { font-size: 13px; letter-spacing: 1px; color: #c8d0da; }
      #loadBar { width: min(320px, 64vw); height: 10px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
      #loadFill { height: 100%; width: 0%; background: #ffd34d; border-radius: 6px; transition: width .3s ease; }
      /* When on-screen touch controls are active the GAS button lives bottom-right, so
         move the speedo up out of its way and shrink the top race HUD for narrow screens.
         Keyed to a body class set by Input.ts so it matches exactly when controls show. */
      body.touch-active #speedo { bottom: auto; top: 34px; right: 12px; }
      body.touch-active #speedo .n { font-size: 34px; }
      body.touch-active #racehud { gap: 12px; padding: 6px 12px; transform: translateX(-50%) scale(0.82); transform-origin: top center; }
      /* Arcade-mode HUD (score / continues / collected letters) — shown only in Arcade mode by main.ts. */
      #arcadeHud {
        position: absolute; top: 44px; left: 12px; display: none; flex-direction: column; gap: 1px;
        background: rgba(0,0,0,0.42); padding: 7px 11px; border-radius: 8px;
        font-variant-numeric: tabular-nums; color: #cfe0f0;
      }
      #arcadeHud .lbl { font-size: 9px; color: #9aa6b3; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
      #arcadeHud .big { font-size: 18px; font-weight: 800; color: #ffd34d; line-height: 1.05; }
      #arcadeHud #arcLetters { font-size: 15px; font-weight: 800; letter-spacing: 3px; color: #6dff7a; }
    </style>
  </head>
  <body>
    <div id="app"><canvas id="renderCanvas"></canvas></div>
    <div id="hud">
      <button id="view" type="button" title="Change camera view: In-Car / Track / Aerial (V)">📺 Track</button>
      <div id="title">RC Dirt Oval <small>1/10 Dirt Oval &middot; Losi 22S Sprint</small></div>
      <div id="fps">-- fps</div>
      <button id="mute" type="button" title="Mute engine sound (M)">🔊</button>
      <button id="pause" type="button" title="Pause (P)">⏸</button>
      <div id="racehud">
        <div><div class="lbl">Lap</div><div class="val" id="hudLap">1<small>/15</small></div></div>
        <div><div class="lbl">Pos</div><div class="val" id="hudPos">1<small>/8</small></div></div>
        <div><div class="lbl">Lap Time</div><div class="val" id="hudTime">0.00</div></div>
        <div><div class="lbl">Best</div><div class="val" id="hudBest">--</div></div>
      </div>
      <div id="speedo"><div class="n" id="hudSpeed">0</div><div class="u">MPH</div></div>
      <div id="arcadeHud">
        <div class="lbl">Score</div><div class="big" id="arcScore">0</div>
        <div class="lbl">Continues</div><div class="big" id="arcCont">3</div>
      </div>
      <div id="pauseOverlay">⏸ PAUSED<br><span style="font-size:14px;color:#cfe0f0">press P or tap to resume</span></div>
    </div>
    <div id="loading">
      <img id="loadLogo" src="./superjay-32.png" alt="Super Jay 32" />
      <div id="loadCredit">Created by Aaron Blair</div>
      <div id="loadTitle">RC DIRT OVAL</div>
      <div id="loadBar"><div id="loadFill"></div></div>
      <div id="loadLabel">Loading&hellip;</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
